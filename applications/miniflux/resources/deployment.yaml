apiVersion: apps/v1
kind: Deployment

metadata:
  name: deployment

spec:
  progressDeadlineSeconds: 60
  replicas: 1
  selector:
    matchLabels:
      app: default
  template:
    metadata:
      labels:
        app: default
    spec:
      containers:
        - image: docker.io/miniflux/miniflux:2.2.18
          name: miniflux
          command:
            - /bin/sh
            - -c
            - exit 1
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: config
            - secretRef:
                name: miniflux-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-app
                  key: uri
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 10

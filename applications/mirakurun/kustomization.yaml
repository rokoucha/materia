apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mirakurun

resources:
  - ./resources/config.yaml
  - ./resources/authentik-proxy-service.yaml
  - ./resources/statefulset.yaml
  - ./resources/ghcr-credentials.yaml
  - ./resources/ingress.yaml
  - ./resources/namespace.yaml
  - ./resources/oauth2-proxy-deployment.yaml
  - ./resources/oauth2-proxy-secret.yaml
  - ./resources/oauth2-proxy-service.yaml
  - ./resources/persistent-volume-claim.yaml
  - ./resources/service.yaml
  - ./resources/tls.yaml

configMapGenerator:
  - name: oauth2-proxy-config
    envs:
      - ./config/oauth2-proxy.env

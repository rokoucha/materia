deploymentMode: SingleBinary

global:
  clusterDomain: materia-cluster.ggrel.net

loki:
  auth_enabled: false

  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1

  limits_config:
    retention_period: 168h

  compactor:
    retention_enabled: true
    delete_request_store: filesystem
    working_directory: /var/loki/compactor

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  podSecurityContext:
    fsGroup: 2000
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 2000
    runAsUser: 1000
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 2000
    runAsNonRoot: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: beryllium-iscsi
    size: 10Gi
  podSecurityContext:
    fsGroup: 2000
    fsGroupChangePolicy: OnRootMismatch
    runAsGroup: 2000
    runAsUser: 1000

write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false

resultsCache:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false

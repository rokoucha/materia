apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grafana

helmCharts:
  - name: grafana
    releaseName: grafana
    namespace: grafana
    version: 10.5.15
    repo: https://grafana.github.io/helm-charts
    valuesFile: ./values.yaml

resources:
  - ./resources/grafana-secrets.yaml
  - ./resources/namespace.yaml
  - ./resources/persistent-volume-claim.yaml
  - ./resources/tls.yaml

configMapGenerator:
  - name: config
    envs:
      - ./config/config.env

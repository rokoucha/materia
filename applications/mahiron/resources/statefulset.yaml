apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mahiron

spec:
  replicas: 1
  serviceName: service
  selector:
    matchLabels:
      app: mahiron
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mahiron
    spec:
      containers:
        - name: mahiron
          image: ghcr.io/rokoucha/mahiron:2026.0724.031223-nightly
          env:
            - name: TZ
              value: Asia/Tokyo
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: k8s.node.name=$(K8S_NODE_NAME),k8s.namespace.name=$(K8S_NAMESPACE),k8s.pod.name=$(K8S_POD_NAME),k8s.pod.uid=$(K8S_POD_UID),k8s.pod.ip=$(K8S_POD_IP),k8s.container.name=mahiron,k8s.statefulset.name=mahiron
          ports:
            - name: mahiron
              containerPort: 40772
          readinessProbe:
            httpGet:
              path: /api/version
              port: mahiron
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/version
              port: mahiron
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: data
              mountPath: /app/db
      volumes:
        - name: config
          secret:
            secretName: mahiron-config
        - name: data
          persistentVolumeClaim:
            claimName: data

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oauth2-proxy

resources:
  - ./resources/deployment.yaml
  - ./resources/htpasswd.yaml
  - ./resources/namespace.yaml
  - ./resources/oauth2-proxy-secrets.yaml
  - ./resources/service.yaml

configMapGenerator:
  - name: config
    envs:
      - ./config/config.env

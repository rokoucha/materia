apiVersion: v1
kind: Service

metadata:
  name: lb-test
  namespace: lb-test
  labels:
    chlorinate.rokoucha.com/lb: public-test
  annotations:
    io.cilium/lb-ipam-ips: "172.16.2.64,2404:9200:225:103::64"

spec:
  selector:
    app: lb-test
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  externalTrafficPolicy: Local
  ports:
    - name: http
      port: 80
      targetPort: 80

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

helmCharts:
  - name: kube-state-metrics
    releaseName: kube-state-metrics
    namespace: monitoring
    version: 7.3.0
    repo: https://prometheus-community.github.io/helm-charts
    valuesFile: ./values-kube-state-metrics.yaml
  - name: prometheus-node-exporter
    releaseName: prometheus-node-exporter
    namespace: monitoring
    version: 4.54.0
    repo: https://prometheus-community.github.io/helm-charts
    valuesFile: ./values-node-exporter.yaml

resources:
  - ./resources/mackerel-agent-sa.yaml
  - ./resources/mackerel-agent.yaml
  - ./resources/mackerel-apikey.yaml
  - ./resources/namespace.yaml
  - ./resources/otelcol-agent-role.yaml
  - ./resources/otelcol-agent-rolebinding.yaml
  - ./resources/otelcol-agent-sa.yaml
  - ./resources/otelcol-agent.yaml
  - ./resources/otelcol-clusteragent-role.yaml
  - ./resources/otelcol-clusteragent-rolebinding.yaml
  - ./resources/otelcol-clusteragent-sa.yaml
  - ./resources/otelcol-clusteragent.yaml
  - ./resources/otelcol-external-ingress.yaml
  - ./resources/otelcol-external-tls.yaml
  - ./resources/otelcol-external-token.yaml
  - ./resources/otelcol-external.yaml
  - ./resources/otelcol-gateway-role.yaml
  - ./resources/otelcol-gateway-rolebinding.yaml
  - ./resources/otelcol-gateway-sa.yaml
  - ./resources/otelcol-gateway-ta-role.yaml
  - ./resources/otelcol-gateway-ta-rolebinding.yaml
  - ./resources/otelcol-gateway-ta-sa.yaml
  - ./resources/otelcol-gateway.yaml
  - ./resources/prometheus-persistent-volume-claim.yaml
  - ./resources/prometheus-persistent-volume.yaml
  - ./resources/prometheus.yaml

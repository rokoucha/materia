deploymentMode: SingleBinary

global:
  clusterDomain: materia-cluster.ggrel.net

loki:
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1

  # ストレージ設定 (ファイルシステムを使用)
  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  # セキュリティコンテキストの設定
  podSecurityContext:
    fsGroup: 10001
    runAsGroup: 10001
    runAsUser: 10001
  containerSecurityContext:
    runAsUser: 10001
    runAsGroup: 10001
    runAsNonRoot: true

# 永続ストレージ (PVC) の設定
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: beryllium-nfs
    size: 10Gi
  podSecurityContext:
    fsGroup: 10001
    runAsGroup: 10001
    runAsUser: 10001
  initContainers:
    - name: fix-permissions
      image: busybox:1.36.1
      command:
        - sh
        - -c
        - |
          chown -R 10001:10001 /var/loki
      securityContext:
        runAsUser: 0
        privileged: true
      volumeMounts:
        - name: storage
          mountPath: /var/loki

# SSDモード用のコンポーネントを 0 にしてバリデーションを回避
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

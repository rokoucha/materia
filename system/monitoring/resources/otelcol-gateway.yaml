apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector

metadata:
  name: otelcol-gateway

spec:
  config:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
      prometheus:
        config:
          scrape_configs: []
      prometheus/self:
        config:
          scrape_configs:
            - job_name: opentelemetry-collector
              scrape_interval: 10s
              static_configs:
                - targets: ["0.0.0.0:8888"]

    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: 1000
        spike_limit_mib: 256
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.node.name
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.pod.name
            - k8s.pod.start_time
            - k8s.pod.uid
            - service.namespace
            - service.name
            - service.instance.id
          otel_annotations: true
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resource/append_otelcol_agent_pod_ip:
        attributes:
          - key: k8s.pod.ip
            action: insert
            value: ${env:MY_POD_IP}
      resource/cluster_name:
        attributes:
          - key: k8s.cluster.name
            value: materia-cluster
            action: upsert
      resource/remove_k8s_pod_ip:
        attributes:
          - key: k8s.pod.ip
            action: delete
      transform/add_sample_key:
        error_mode: ignore
        log_statements:
          - set(log.attributes["_sample_key"], UUID())
      probabilistic_sampler/logs:
        sampling_percentage: 10
        mode: hash_seed
        attribute_source: record
        from_attribute: _sample_key
        hash_seed: 12345
        fail_closed: true
      transform/remove_sample_key:
        error_mode: ignore
        log_statements:
          - delete_key(log.attributes, "_sample_key")
    exporters:
      mackerel_otlp: {}
      otlphttp/prometheus:
        metrics_endpoint: http://prometheus-operated.prometheus.svc.materia-cluster.ggrel.net:9090/api/v1/otlp/v1/metrics
      otlphttp/loki:
        endpoint: http://loki-gateway.loki.svc.materia-cluster.ggrel.net/otlp
        tls:
          insecure: true
      otlp/tempo:
        endpoint: tempo.tempo.svc.materia-cluster.ggrel.net:4317
        tls:
          insecure: true
    connectors:
      routing/metrics:
        table:
          - condition: "true"
            pipelines:
              - metrics

    service:
      pipelines:
        metrics/self:
          receivers:
            - prometheus/self
          processors:
            - resource/append_otelcol_agent_pod_ip
          exporters:
            - routing/metrics
        metrics:
          receivers:
            - routing/metrics
            - otlp
            - prometheus
          processors:
            - memory_limiter
            - batch
            - k8sattributes
            - resource/cluster_name
            - resource/remove_k8s_pod_ip
          exporters:
            - mackerel_otlp
            - otlphttp/prometheus
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - k8sattributes
            - resource/cluster_name
            - resource/remove_k8s_pod_ip
          exporters:
            - mackerel_otlp
            - otlp/tempo
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
            - k8sattributes
            - resource/cluster_name
            - resource/remove_k8s_pod_ip
          exporters:
            - otlphttp/loki
        logs/mackerel:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource/cluster_name
            - resource/remove_k8s_pod_ip
            - transform/add_sample_key
            - probabilistic_sampler/logs
            - transform/remove_sample_key
          exporters:
            - mackerel_otlp
  envFrom:
    - secretRef:
        name: mackerel-apikey
  env:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
  image: ghcr.io/rokoucha/otelcol/materia-gateway:20260716.153940
  ipFamilies:
    - IPv4
    - IPv6
  ipFamilyPolicy: RequireDualStack
  mode: statefulset
  serviceAccount: otelcol-gateway-sa
  targetAllocator:
    allocationStrategy: consistent-hashing
    enabled: true
    prometheusCR:
      enabled: true
      podMonitorSelector: {}
      serviceMonitorSelector: {}
    serviceAccount: otelcol-gateway-ta-sa

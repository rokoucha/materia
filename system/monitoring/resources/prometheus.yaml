apiVersion: monitoring.coreos.com/v1
kind: Prometheus

metadata:
  name: prometheus

spec:
  image: quay.io/prometheus/prometheus:v3.11.2
  enableOTLPReceiver: true
  enableFeatures:
    - otlp-deltatocumulative
  # ServiceMonitor / PodMonitor discovery is handled by the OpenTelemetry Operator.
  # Keep Prometheus from selecting any of them directly.
  serviceMonitorSelector:
    matchLabels:
      materia-cluster.ggrel.net/prometheus: disabled
  serviceMonitorNamespaceSelector: {}
  podMonitorSelector:
    matchLabels:
      materia-cluster.ggrel.net/prometheus: disabled
  podMonitorNamespaceSelector: {}
  scrapeInterval: 15s
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: beryllium-iscsi
        resources:
          requests:
            storage: 30Gi
  securityContext:
    fsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
  retention: 30d
  evaluationInterval: 30s

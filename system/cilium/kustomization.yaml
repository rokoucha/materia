apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./resources/cilium-lb-ipv6-pool-updater-rbac.yaml
  - ./resources/l2-announcement-policy.yaml
  - ./resources/bgp-cluster-config.yaml
  - ./resources/bgp-peer-config.yaml
  - ./resources/bgp-peer-config-v6.yaml
  - ./resources/bgp-advertisement.yaml

helmCharts:
  - name: cilium
    releaseName: cilium
    namespace: kube-system
    version: 1.19.5
    repo: https://helm.cilium.io
    includeCRDs: true
    valuesFile: ./values.yaml

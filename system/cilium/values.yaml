cluster:
  name: materia-cluster
hubble:
  peerService:
    clusterDomain: materia-cluster.ggrel.net
  preferIpv6: true
  relay:
    enabled: true
  ui:
    enabled: true
    ingress:
      annotations:
        haproxy.org/ssl-redirect: "true"
      enabled: true
      className: haproxy
      hosts:
        - hubble.materia.ggrel.net
ipam:
  operator:
    clusterPoolIPv4MaskSize: 24
    clusterPoolIPv4PodCIDRList:
      - 10.244.0.0/16
    clusterPoolIPv6MaskSize: 120
    clusterPoolIPv6PodCIDRList:
      - fd00::/108
ipv4:
  enabled: true
ipv6:
  enabled: true
k8sServiceHost: localhost
k8sServicePort: 7445
kubeProxyReplacement: true
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
operator:
  replicas: 1
prometheus:
  enabled: true
rollOutCiliumPods: true
routingMode: tunnel
serviceAccounts:
  cilium:
    name: cilium
  operator:
    name: cilium-operator
tunnelProtocol: vxlan
upgradeCompatibility: "1.18"

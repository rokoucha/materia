apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloudflare-ddns-external

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflare-ddns-external
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflare-ddns-external
    spec:
      containers:
        - name: cloudflare-ddns
          image: ghcr.io/rokoucha/cloudflare-ddns:20260412.191727
          imagePullPolicy: IfNotPresent
          args:
            - -e
            - -w
            - 5m
            - -n
            - materia
            - ggrel.net
          env:
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-ddns-apitoken
                  key: CLOUDFLARE_API_TOKEN
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

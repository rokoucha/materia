apiVersion: v1
kind: ConfigMap

metadata:
  name: argocd-notifications-cm

data:
  context: |
    argocdUrl: https://argocd.materia.ggrel.net

  defaultTriggers: |
    - on-deployed
    - on-status-change
    - on-health-degraded
    - on-health-unknown
    - on-health-recovered

  subscriptions: |
    - recipients:
        - discord
      triggers:
        - on-status-change
        - on-health-degraded
        - on-health-unknown
        - on-health-recovered

  service.github: |
    appID: 980715
    installationID: 54216756
    privateKey: $github-privateKey

  service.webhook.discord: |
    url: $discord-webhookUrl
    headers:
      - name: Content-Type
        value: application/json

  template.discord-status: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "username": "Argo CD",
            "embeds": [
              {
                {{if eq .app.status.operationState.phase "Succeeded"}}"color": 34628,{{end}}
                {{if eq .app.status.operationState.phase "Running"}}"color": 16754432,{{end}}
                {{if eq .app.status.operationState.phase "Error"}}"color": 14036256,{{end}}
                {{if eq .app.status.operationState.phase "Failed"}}"color": 14036256,{{end}}
                "title": "{{.app.metadata.name}}",
                "description": "Application state is now **{{.app.status.operationState.phase}}**.",
                "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
              }
            ]
          }

  template.discord-health-degraded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "username": "Argo CD",
            "embeds": [
              {
                "color": 14036256,
                "title": "{{.app.metadata.name}}",
                "description": "Application health is now **{{.app.status.health.status}}**.",
                "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
                "fields": [
                  {
                    "name": "Health",
                    "value": "{{.app.status.health.status}}",
                    "inline": true
                  },
                  {
                    "name": "Sync",
                    "value": "{{.app.status.sync.status}}",
                    "inline": true
                  }
                ]
              }
            ]
          }

  template.discord-health-unknown: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "username": "Argo CD",
            "embeds": [
              {
                "color": 16754432,
                "title": "{{.app.metadata.name}}",
                "description": "Application health is now **{{.app.status.health.status}}**.",
                "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
                "fields": [
                  {
                    "name": "Health",
                    "value": "{{.app.status.health.status}}",
                    "inline": true
                  },
                  {
                    "name": "Sync",
                    "value": "{{.app.status.sync.status}}",
                    "inline": true
                  }
                ]
              }
            ]
          }

  template.discord-health-recovered: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "username": "Argo CD",
            "embeds": [
              {
                "color": 34628,
                "title": "{{.app.metadata.name}}",
                "description": "Application health recovered to **{{.app.status.health.status}}**.",
                "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
                "fields": [
                  {
                    "name": "Health",
                    "value": "{{.app.status.health.status}}",
                    "inline": true
                  },
                  {
                    "name": "Sync",
                    "value": "{{.app.status.sync.status}}",
                    "inline": true
                  }
                ]
              }
            ]
          }

  template.github-success: |
    message: Application {{.app.metadata.name}} is now running new version of deployments manifests.
    github:
      status:
        state: success
        label: "CD/{{.app.metadata.name}}"
        targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}?operation=true"

  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.operationState.syncResult.revision
      send: [github-success]

  trigger.on-status-change: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      oncePer: app.status.operationState.syncResult.revision
      send: [discord-status]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      oncePer: app.status.health.status
      send: [discord-health-degraded]

  trigger.on-health-unknown: |
    - when: app.status.health.status == 'Unknown'
      oncePer: app.status.health.status
      send: [discord-health-unknown]

  trigger.on-health-recovered: |
    - when: app.status.health.status == 'Healthy'
      oncePer: app.status.health.status
      send: [discord-health-recovered]

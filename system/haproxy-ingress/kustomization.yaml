apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: haproxy-controller

helmCharts:
  - name: kubernetes-ingress
    releaseName: haproxy-ingress
    namespace: haproxy-controller
    version: 1.52.1
    repo: https://haproxytech.github.io/helm-charts
    includeCRDs: true
    valuesFile: ./values.yaml

resources:
  - ./resources/namespace.yaml
  - ./resources/ggrel-net-certificate.yaml
  - ./resources/materia-ggrel-net-certificate.yaml
  - ./resources/noa-pp-ua-certificate.yaml
  - ./resources/rokoucha-net-certificate.yaml
  - ./resources/sayn-wittgenste-in-certificate.yaml
  - ./resources/forward-auth-validation-rules.yaml

configMapGenerator:
  - name: haproxy-forward-auth-lua
    files:
      - materia-forward-auth.lua=./lua/materia-forward-auth.lua

apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  name: cilium

spec:
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - jsonPointers:
        - /data/ca.crt
        - /data/ca.key
      kind: Secret
      name: cilium-ca
    - jsonPointers:
        - /data/ca.crt
        - /data/tls.crt
        - /data/tls.key
      kind: Secret
      name: hubble-relay-client-certs
    - jsonPointers:
        - /data/ca.crt
        - /data/tls.crt
        - /data/tls.key
      kind: Secret
      name: hubble-server-certs
    - kind: Namespace
      name: kube-system
  project: system
  source:
    path: system/cilium
    repoURL: https://github.com/rokoucha/materia.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
